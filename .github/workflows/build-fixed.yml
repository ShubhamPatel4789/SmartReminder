name: Build Smart Reminder APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate all project files
        run: |
          python3 << 'PYEOF'
          import os

          def w(path, content):
              os.makedirs(os.path.dirname(path) if os.path.dirname(path) else '.', exist_ok=True)
              with open(path, 'w') as f:
                  f.write(content)

          # ── Gradle build files ─────────────────────────────────────────
          w("settings.gradle", 'rootProject.name = "SmartReminder"\ninclude ":app"\n')

          w("build.gradle", """buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath "com.android.tools.build:gradle:7.4.2" }
          }
          allprojects { repositories { google(); mavenCentral() } }
          """)

          w("gradle.properties", """android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          """)

          w("app/build.gradle", """plugins { id "com.android.application" }
          android {
              compileSdkVersion 33
              defaultConfig {
                  applicationId "com.shubham.reminderapp"
                  minSdkVersion 21
                  targetSdkVersion 33
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes { release { minifyEnabled false }; debug {} }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          dependencies {
              implementation "androidx.appcompat:appcompat:1.6.1"
              implementation "com.google.android.material:material:1.9.0"
          }
          """)

          # ── AndroidManifest ────────────────────────────────────────────
          w("app/src/main/AndroidManifest.xml", """<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.shubham.reminderapp">
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>
              <uses-permission android:name="android.permission.VIBRATE"/>
              <uses-permission android:name="android.permission.WAKE_LOCK"/>
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
              <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM"/>
              <uses-permission android:name="android.permission.USE_EXACT_ALARM"/>
              <application android:label="Smart Reminder"
                  android:theme="@style/AppTheme"
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <activity android:name=".AddEditReminderActivity"
                      android:exported="false"
                      android:windowSoftInputMode="adjustResize"/>
                  <receiver android:name=".ReminderAlarmReceiver" android:exported="false"/>
                  <receiver android:name=".BootReceiver" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.BOOT_COMPLETED"/>
                      </intent-filter>
                  </receiver>
              </application>
          </manifest>
          """)

          # ── Java source files ──────────────────────────────────────────
          SRC = "app/src/main/java/com/shubham/reminderapp"

          w(f"{SRC}/Reminder.java", """package com.shubham.reminderapp;
          public class Reminder {
              private int id, recurDayOfMonth;
              private String title, message, category, recurType, recurDays;
              private long datetimeMillis;
              private boolean recurring, enabled;
              public int getId(){return id;} public void setId(int v){id=v;}
              public String getTitle(){return title;} public void setTitle(String v){title=v;}
              public String getMessage(){return message;} public void setMessage(String v){message=v;}
              public String getCategory(){return category;} public void setCategory(String v){category=v;}
              public long getDatetimeMillis(){return datetimeMillis;} public void setDatetimeMillis(long v){datetimeMillis=v;}
              public boolean isRecurring(){return recurring;} public void setRecurring(boolean v){recurring=v;}
              public String getRecurType(){return recurType;} public void setRecurType(String v){recurType=v;}
              public String getRecurDays(){return recurDays;} public void setRecurDays(String v){recurDays=v;}
              public int getRecurDayOfMonth(){return recurDayOfMonth;} public void setRecurDayOfMonth(int v){recurDayOfMonth=v;}
              public boolean isEnabled(){return enabled;} public void setEnabled(boolean v){enabled=v;}
          }
          """)

          w(f"{SRC}/DatabaseHelper.java", """package com.shubham.reminderapp;
          import android.content.ContentValues; import android.content.Context;
          import android.database.Cursor; import android.database.sqlite.*;
          import java.util.*; 
          public class DatabaseHelper extends SQLiteOpenHelper {
              private static final String DB="reminders.db";
              static final String T="reminders",C_ID="_id",C_TI="title",C_MS="message",C_CA="category",
                  C_DT="dt",C_RE="recurring",C_RT="recur_type",C_RD="recur_days",C_RM="recur_dom",C_EN="enabled";
              public DatabaseHelper(Context c){super(c,DB,null,1);}
              @Override public void onCreate(SQLiteDatabase db){
                  db.execSQL("CREATE TABLE "+T+"("+C_ID+" INTEGER PRIMARY KEY AUTOINCREMENT,"+
                      C_TI+" TEXT,"+C_MS+" TEXT,"+C_CA+" TEXT,"+C_DT+" INTEGER,"+
                      C_RE+" INTEGER DEFAULT 0,"+C_RT+" TEXT,"+C_RD+" TEXT,"+
                      C_RM+" INTEGER DEFAULT 1,"+C_EN+" INTEGER DEFAULT 1)");}
              @Override public void onUpgrade(SQLiteDatabase db,int o,int n){db.execSQL("DROP TABLE IF EXISTS "+T);onCreate(db);}
              public long insert(Reminder r){SQLiteDatabase db=getWritableDatabase();long id=db.insert(T,null,cv(r));db.close();return id;}
              public void update(Reminder r){SQLiteDatabase db=getWritableDatabase();db.update(T,cv(r),C_ID+"=?",new String[]{String.valueOf(r.getId())});db.close();}
              public void delete(int id){SQLiteDatabase db=getWritableDatabase();db.delete(T,C_ID+"=?",new String[]{String.valueOf(id)});db.close();}
              public void setEnabled(int id,boolean en){SQLiteDatabase db=getWritableDatabase();ContentValues cv=new ContentValues();cv.put(C_EN,en?1:0);db.update(T,cv,C_ID+"=?",new String[]{String.valueOf(id)});db.close();}
              public Reminder get(int id){SQLiteDatabase db=getReadableDatabase();Cursor c=db.query(T,null,C_ID+"=?",new String[]{String.valueOf(id)},null,null,null);Reminder r=null;if(c.moveToFirst())r=from(c);c.close();db.close();return r;}
              public List<Reminder> getAll(){SQLiteDatabase db=getReadableDatabase();Cursor c=db.query(T,null,null,null,null,null,C_DT+" ASC");List<Reminder> l=new ArrayList<>();while(c.moveToNext())l.add(from(c));c.close();db.close();return l;}
              public List<Reminder> getEnabled(){SQLiteDatabase db=getReadableDatabase();Cursor c=db.query(T,null,C_EN+"=1",null,null,null,null);List<Reminder> l=new ArrayList<>();while(c.moveToNext())l.add(from(c));c.close();db.close();return l;}
              private ContentValues cv(Reminder r){ContentValues cv=new ContentValues();cv.put(C_TI,r.getTitle());cv.put(C_MS,r.getMessage());cv.put(C_CA,r.getCategory());cv.put(C_DT,r.getDatetimeMillis());cv.put(C_RE,r.isRecurring()?1:0);cv.put(C_RT,r.getRecurType());cv.put(C_RD,r.getRecurDays());cv.put(C_RM,r.getRecurDayOfMonth());cv.put(C_EN,r.isEnabled()?1:0);return cv;}
              private Reminder from(Cursor c){Reminder r=new Reminder();r.setId(c.getInt(c.getColumnIndexOrThrow(C_ID)));r.setTitle(c.getString(c.getColumnIndexOrThrow(C_TI)));r.setMessage(c.getString(c.getColumnIndexOrThrow(C_MS)));r.setCategory(c.getString(c.getColumnIndexOrThrow(C_CA)));r.setDatetimeMillis(c.getLong(c.getColumnIndexOrThrow(C_DT)));r.setRecurring(c.getInt(c.getColumnIndexOrThrow(C_RE))==1);r.setRecurType(c.getString(c.getColumnIndexOrThrow(C_RT)));r.setRecurDays(c.getString(c.getColumnIndexOrThrow(C_RD)));r.setRecurDayOfMonth(c.getInt(c.getColumnIndexOrThrow(C_RM)));r.setEnabled(c.getInt(c.getColumnIndexOrThrow(C_EN))==1);return r;}
          }
          """)

          w(f"{SRC}/AlarmScheduler.java", """package com.shubham.reminderapp;
          import android.app.*; import android.content.*; import android.os.Build; import java.util.Calendar;
          public class AlarmScheduler {
              public static void schedule(Context ctx, Reminder r){
                  if(!r.isEnabled())return;
                  AlarmManager am=(AlarmManager)ctx.getSystemService(Context.ALARM_SERVICE);
                  Intent i=new Intent(ctx,ReminderAlarmReceiver.class);
                  i.putExtra("id",r.getId());i.putExtra("title",r.getTitle());
                  i.putExtra("message",r.getMessage()!=null?r.getMessage():"");
                  i.putExtra("category",r.getCategory()!=null?r.getCategory():"");
                  i.putExtra("recurring",r.isRecurring());i.putExtra("recur_type",r.getRecurType()!=null?r.getRecurType():"");
                  i.putExtra("recur_days",r.getRecurDays()!=null?r.getRecurDays():"");i.putExtra("recur_dom",r.getRecurDayOfMonth());
                  PendingIntent pi=PendingIntent.getBroadcast(ctx,r.getId(),i,PendingIntent.FLAG_UPDATE_CURRENT|PendingIntent.FLAG_IMMUTABLE);
                  long t=r.getDatetimeMillis();
                  if(!r.isRecurring()&&t<System.currentTimeMillis())return;
                  if(Build.VERSION.SDK_INT>=23)am.setExactAndAllowWhileIdle(AlarmManager.RTC_WAKEUP,t,pi);
                  else am.setExact(AlarmManager.RTC_WAKEUP,t,pi);
              }
              public static void cancel(Context ctx,int id){
                  AlarmManager am=(AlarmManager)ctx.getSystemService(Context.ALARM_SERVICE);
                  PendingIntent pi=PendingIntent.getBroadcast(ctx,id,new Intent(ctx,ReminderAlarmReceiver.class),PendingIntent.FLAG_UPDATE_CURRENT|PendingIntent.FLAG_IMMUTABLE);
                  am.cancel(pi);
              }
              public static long nextOccurrence(Reminder r){
                  Calendar now=Calendar.getInstance(),base=Calendar.getInstance();
                  base.setTimeInMillis(r.getDatetimeMillis());
                  int h=base.get(Calendar.HOUR_OF_DAY),m=base.get(Calendar.MINUTE);
                  if("DAILY".equals(r.getRecurType())){Calendar n=Calendar.getInstance();n.set(Calendar.HOUR_OF_DAY,h);n.set(Calendar.MINUTE,m);n.set(Calendar.SECOND,0);if(!n.after(now))n.add(Calendar.DAY_OF_YEAR,1);return n.getTimeInMillis();}
                  if("WEEKLY".equals(r.getRecurType())){String days=r.getRecurDays();if(days==null||days.isEmpty())return -1;for(int off=0;off<=7;off++){Calendar n=Calendar.getInstance();n.add(Calendar.DAY_OF_YEAR,off);n.set(Calendar.HOUR_OF_DAY,h);n.set(Calendar.MINUTE,m);n.set(Calendar.SECOND,0);if(!n.after(now))continue;int dow=n.get(Calendar.DAY_OF_WEEK);for(String p:days.split(","))if(Integer.parseInt(p.trim())==dow)return n.getTimeInMillis();}return -1;}
                  if("MONTHLY".equals(r.getRecurType())){Calendar n=Calendar.getInstance();n.set(Calendar.DAY_OF_MONTH,r.getRecurDayOfMonth());n.set(Calendar.HOUR_OF_DAY,h);n.set(Calendar.MINUTE,m);n.set(Calendar.SECOND,0);if(!n.after(now))n.add(Calendar.MONTH,1);return n.getTimeInMillis();}
                  return -1;
              }
          }
          """)

          w(f"{SRC}/ReminderAlarmReceiver.java", """package com.shubham.reminderapp;
          import android.app.*; import android.content.*; import android.media.RingtoneManager; import android.net.Uri; import android.os.Build;
          public class ReminderAlarmReceiver extends BroadcastReceiver {
              static final String CH="smart_reminders_v1";
              @Override public void onReceive(Context ctx,Intent intent){
                  int id=intent.getIntExtra("id",0);String title=intent.getStringExtra("title"),msg=intent.getStringExtra("message"),cat=intent.getStringExtra("category");
                  boolean rec=intent.getBooleanExtra("recurring",false);String rtype=intent.getStringExtra("recur_type"),rdays=intent.getStringExtra("recur_days");int rdom=intent.getIntExtra("recur_dom",1);
                  showNotification(ctx,id,title,msg,cat);
                  if(rec){Reminder r=new Reminder();r.setId(id);r.setTitle(title);r.setMessage(msg);r.setRecurring(true);r.setRecurType(rtype);r.setRecurDays(rdays);r.setRecurDayOfMonth(rdom);r.setEnabled(true);long next=AlarmScheduler.nextOccurrence(r);if(next>0){r.setDatetimeMillis(next);new DatabaseHelper(ctx).update(r);AlarmScheduler.schedule(ctx,r);}}
              }
              private void showNotification(Context ctx,int id,String title,String msg,String cat){
                  NotificationManager nm=(NotificationManager)ctx.getSystemService(Context.NOTIFICATION_SERVICE);
                  if(Build.VERSION.SDK_INT>=26){NotificationChannel ch=new NotificationChannel(CH,"Smart Reminders",NotificationManager.IMPORTANCE_HIGH);nm.createNotificationChannel(ch);}
                  Intent tap=new Intent(ctx,MainActivity.class);tap.setFlags(Intent.FLAG_ACTIVITY_NEW_TASK|Intent.FLAG_ACTIVITY_CLEAR_TASK);
                  PendingIntent pi=PendingIntent.getActivity(ctx,id,tap,PendingIntent.FLAG_UPDATE_CURRENT|PendingIntent.FLAG_IMMUTABLE);
                  Uri sound=RingtoneManager.getDefaultUri(RingtoneManager.TYPE_NOTIFICATION);
                  Notification.Builder b=Build.VERSION.SDK_INT>=26?new Notification.Builder(ctx,CH):new Notification.Builder(ctx);
                  b.setSmallIcon(android.R.drawable.ic_popup_reminder).setContentTitle(emoji(cat)+" "+title)
                   .setContentText(msg!=null&&!msg.isEmpty()?msg:"").setStyle(new Notification.BigTextStyle().bigText(msg!=null?msg:""))
                   .setContentIntent(pi).setAutoCancel(true).setSound(sound).setVibrate(new long[]{0,300,100,300});
                  if(Build.VERSION.SDK_INT<26)b.setPriority(Notification.PRIORITY_HIGH);
                  nm.notify(id,b.build());
              }
              private String emoji(String c){if(c==null)return"\\uD83D\\uDD14";switch(c){case"Health / Exercise":return"\\uD83D\\uDCAA";case"Payment / Finance":return"\\uD83D\\uDCB0";case"Work":return"\\uD83D\\uDCBC";case"Personal":return"\\uD83D\\uDC64";default:return"\\uD83D\\uDD14";}}
          }
          """)

          w(f"{SRC}/BootReceiver.java", """package com.shubham.reminderapp;
          import android.content.*; import java.util.List;
          public class BootReceiver extends BroadcastReceiver {
              @Override public void onReceive(Context ctx,Intent i){
                  DatabaseHelper db=new DatabaseHelper(ctx);List<Reminder> l=db.getEnabled();
                  for(Reminder r:l){if(r.isRecurring()){long n=AlarmScheduler.nextOccurrence(r);if(n>0){r.setDatetimeMillis(n);db.update(r);}}if(r.getDatetimeMillis()>System.currentTimeMillis())AlarmScheduler.schedule(ctx,r);}
              }
          }
          """)

          w(f"{SRC}/MainActivity.java", """package com.shubham.reminderapp;
          import android.app.*; import android.content.Intent; import android.os.Bundle; import android.view.*; import android.widget.*; import java.util.*;
          public class MainActivity extends Activity {
              private ListView lv; private ReminderAdapter adapter; private DatabaseHelper db; private List<Reminder> list; static final int RA=1,RE=2;
              @Override protected void onCreate(Bundle b){super.onCreate(b);setContentView(R.layout.activity_main);db=new DatabaseHelper(this);list=new ArrayList<>();lv=(ListView)findViewById(R.id.lv);adapter=new ReminderAdapter(this,list);lv.setAdapter(adapter);load();
                  ((Button)findViewById(R.id.btn_add)).setOnClickListener(v->startActivityForResult(new Intent(this,AddEditReminderActivity.class),RA));
                  lv.setOnItemClickListener((p,v,pos,id)->{Intent i=new Intent(this,AddEditReminderActivity.class);i.putExtra("reminder_id",list.get(pos).getId());startActivityForResult(i,RE);});
                  lv.setOnItemLongClickListener((p,v,pos,id)->{Reminder r=list.get(pos);new AlertDialog.Builder(this).setTitle("Delete?").setMessage("Delete \\""+r.getTitle()+"\\"?").setPositiveButton("Delete",(d,w2)->{AlarmScheduler.cancel(this,r.getId());db.delete(r.getId());load();}).setNegativeButton("Cancel",null).show();return true;});}
              private void load(){list.clear();list.addAll(db.getAll());adapter.notifyDataSetChanged();boolean e=list.isEmpty();lv.setVisibility(e?View.GONE:View.VISIBLE);findViewById(R.id.tv_empty).setVisibility(e?View.VISIBLE:View.GONE);}
              @Override protected void onActivityResult(int q,int r,Intent d){if(r==RESULT_OK)load();}
              @Override protected void onResume(){super.onResume();load();}
          }
          """)

          w(f"{SRC}/ReminderAdapter.java", """package com.shubham.reminderapp;
          import android.content.Context; import android.graphics.Color; import android.view.*; import android.widget.*; import java.text.*; import java.util.*;
          public class ReminderAdapter extends BaseAdapter {
              private Context ctx; private List<Reminder> list; private DatabaseHelper db; private SimpleDateFormat sdf=new SimpleDateFormat("EEE dd MMM yyyy  hh:mm a",Locale.getDefault());
              public ReminderAdapter(Context c,List<Reminder> l){ctx=c;list=l;db=new DatabaseHelper(c);}
              @Override public int getCount(){return list.size();}
              @Override public Reminder getItem(int p){return list.get(p);}
              @Override public long getItemId(int p){return list.get(p).getId();}
              @Override public View getView(int pos,View cv,ViewGroup parent){
                  if(cv==null)cv=LayoutInflater.from(ctx).inflate(R.layout.item_reminder,parent,false);
                  Reminder r=list.get(pos);
                  ((TextView)cv.findViewById(R.id.tv_emoji)).setText(emoji(r.getCategory()));
                  ((TextView)cv.findViewById(R.id.tv_title)).setText(r.getTitle());
                  ((TextView)cv.findViewById(R.id.tv_dt)).setText(sdf.format(new Date(r.getDatetimeMillis())));
                  TextView tvRec=(TextView)cv.findViewById(R.id.tv_recur);
                  if(r.isRecurring()&&r.getRecurType()!=null){tvRec.setVisibility(View.VISIBLE);tvRec.setText(recurLabel(r));}else{tvRec.setVisibility(View.GONE);}
                  cv.findViewById(R.id.color_bar).setBackgroundColor(barColor(r.getCategory()));
                  Switch sw=(Switch)cv.findViewById(R.id.sw);sw.setOnCheckedChangeListener(null);sw.setChecked(r.isEnabled());
                  sw.setOnCheckedChangeListener((btn,checked)->{r.setEnabled(checked);db.setEnabled(r.getId(),checked);if(checked)AlarmScheduler.schedule(ctx,r);else AlarmScheduler.cancel(ctx,r.getId());cv.setAlpha(checked?1f:0.5f);});
                  cv.setAlpha(r.isEnabled()?1f:0.5f);return cv;
              }
              private String emoji(String c){if(c==null)return"\\uD83D\\uDD14";switch(c){case"Health / Exercise":return"\\uD83D\\uDCAA";case"Payment / Finance":return"\\uD83D\\uDCB0";case"Work":return"\\uD83D\\uDCBC";case"Personal":return"\\uD83D\\uDC64";default:return"\\uD83D\\uDD14";}}
              private int barColor(String c){if(c==null)return Color.parseColor("#95a5a6");switch(c){case"Health / Exercise":return Color.parseColor("#27ae60");case"Payment / Finance":return Color.parseColor("#e67e22");case"Work":return Color.parseColor("#2980b9");case"Personal":return Color.parseColor("#8e44ad");default:return Color.parseColor("#95a5a6");}}
              private String recurLabel(Reminder r){if("DAILY".equals(r.getRecurType()))return"Repeats every day";if("MONTHLY".equals(r.getRecurType()))return"Repeats monthly on day "+r.getRecurDayOfMonth();if("WEEKLY".equals(r.getRecurType())&&r.getRecurDays()!=null){String[]n={"","Sun","Mon","Tue","Wed","Thu","Fri","Sat"};StringBuilder sb=new StringBuilder("Weekly: ");for(String s:r.getRecurDays().split(","))sb.append(n[Integer.parseInt(s.trim())]).append(" ");return sb.toString().trim();}return"Recurring";}
          }
          """)

          w(f"{SRC}/AddEditReminderActivity.java", """package com.shubham.reminderapp;
          import android.app.*; import android.os.Bundle; import android.view.*; import android.widget.*; import java.text.*; import java.util.*;
          public class AddEditReminderActivity extends Activity {
              private EditText etT,etM; private Spinner spC; private Button btnD,btnTi,btnS; private CheckBox cbR; private RadioGroup rgT;
              private RadioButton rbD,rbW,rbM; private LinearLayout llW,llMo; private CheckBox[]cbDays=new CheckBox[7]; private NumberPicker npDom;
              private Calendar cal=Calendar.getInstance(); private DatabaseHelper db; private int editId=-1;
              private SimpleDateFormat dfD=new SimpleDateFormat("EEE, dd MMM yyyy",Locale.getDefault()),dfT=new SimpleDateFormat("hh:mm a",Locale.getDefault());
              @Override protected void onCreate(Bundle b){super.onCreate(b);setContentView(R.layout.activity_add_edit);db=new DatabaseHelper(this);
                  etT=(EditText)findViewById(R.id.et_title);etM=(EditText)findViewById(R.id.et_msg);spC=(Spinner)findViewById(R.id.sp_cat);
                  btnD=(Button)findViewById(R.id.btn_date);btnTi=(Button)findViewById(R.id.btn_time);btnS=(Button)findViewById(R.id.btn_save);
                  cbR=(CheckBox)findViewById(R.id.cb_rec);rgT=(RadioGroup)findViewById(R.id.rg_type);rbD=(RadioButton)findViewById(R.id.rb_daily);
                  rbW=(RadioButton)findViewById(R.id.rb_weekly);rbM=(RadioButton)findViewById(R.id.rb_monthly);
                  llW=(LinearLayout)findViewById(R.id.ll_week);llMo=(LinearLayout)findViewById(R.id.ll_month);npDom=(NumberPicker)findViewById(R.id.np_dom);npDom.setMinValue(1);npDom.setMaxValue(28);
                  int[] dayIds={R.id.cb_sun,R.id.cb_mon,R.id.cb_tue,R.id.cb_wed,R.id.cb_thu,R.id.cb_fri,R.id.cb_sat};for(int i=0;i<7;i++)cbDays[i]=(CheckBox)findViewById(dayIds[i]);
                  spC.setAdapter(new ArrayAdapter<>(this,android.R.layout.simple_spinner_dropdown_item,new String[]{"Health / Exercise","Payment / Finance","Work","Personal","General"}));
                  cal.add(Calendar.MINUTE,10);updateBtns();
                  editId=getIntent().getIntExtra("reminder_id",-1);if(editId!=-1){setTitle("Edit Reminder");load();}else setTitle("New Reminder");
                  btnD.setOnClickListener(v->new DatePickerDialog(this,(dp,y,m,d)->{cal.set(y,m,d);updateBtns();},cal.get(Calendar.YEAR),cal.get(Calendar.MONTH),cal.get(Calendar.DAY_OF_MONTH)).show());
                  btnTi.setOnClickListener(v->new TimePickerDialog(this,(tp,h,m)->{cal.set(Calendar.HOUR_OF_DAY,h);cal.set(Calendar.MINUTE,m);cal.set(Calendar.SECOND,0);updateBtns();},cal.get(Calendar.HOUR_OF_DAY),cal.get(Calendar.MINUTE),false).show());
                  cbR.setOnCheckedChangeListener((btn,ch)->updateP());rgT.setOnCheckedChangeListener((g,id)->updateP());btnS.setOnClickListener(v->save());updateP();}
              private void updateBtns(){btnD.setText("Date: "+dfD.format(cal.getTime()));btnTi.setText("Time: "+dfT.format(cal.getTime()));}
              private void updateP(){boolean rec=cbR.isChecked();rgT.setVisibility(rec?View.VISIBLE:View.GONE);llW.setVisibility(rec&&rbW.isChecked()?View.VISIBLE:View.GONE);llMo.setVisibility(rec&&rbM.isChecked()?View.VISIBLE:View.GONE);}
              private void load(){Reminder r=db.get(editId);if(r==null)return;etT.setText(r.getTitle());etM.setText(r.getMessage());cal.setTimeInMillis(r.getDatetimeMillis());updateBtns();
                  String[]cats={"Health / Exercise","Payment / Finance","Work","Personal","General"};for(int i=0;i<cats.length;i++)if(cats[i].equals(r.getCategory())){spC.setSelection(i);break;}
                  cbR.setChecked(r.isRecurring());if(r.isRecurring()&&r.getRecurType()!=null){switch(r.getRecurType()){case"DAILY":rbD.setChecked(true);break;case"WEEKLY":rbW.setChecked(true);if(r.getRecurDays()!=null)for(String s:r.getRecurDays().split(","))cbDays[Integer.parseInt(s.trim())-1].setChecked(true);break;case"MONTHLY":rbM.setChecked(true);npDom.setValue(r.getRecurDayOfMonth());break;}}updateP();}
              private void save(){String title=etT.getText().toString().trim();if(title.isEmpty()){etT.setError("Required");return;}
                  Reminder r=new Reminder();if(editId!=-1)r.setId(editId);r.setTitle(title);r.setMessage(etM.getText().toString().trim());r.setCategory(spC.getSelectedItem().toString());r.setDatetimeMillis(cal.getTimeInMillis());r.setEnabled(true);
                  boolean rec=cbR.isChecked();r.setRecurring(rec);if(rec){int cid=rgT.getCheckedRadioButtonId();if(cid==R.id.rb_daily){r.setRecurType("DAILY");}else if(cid==R.id.rb_weekly){r.setRecurType("WEEKLY");StringBuilder days=new StringBuilder();for(int i=0;i<7;i++)if(cbDays[i].isChecked()){if(days.length()>0)days.append(",");days.append(i+1);}if(days.length()==0){Toast.makeText(this,"Pick at least one day",Toast.LENGTH_SHORT).show();return;}r.setRecurDays(days.toString());}else if(cid==R.id.rb_monthly){r.setRecurType("MONTHLY");r.setRecurDayOfMonth(npDom.getValue());}long next=AlarmScheduler.nextOccurrence(r);if(next>0)r.setDatetimeMillis(next);}
                  if(editId!=-1){AlarmScheduler.cancel(this,editId);db.update(r);}else{long nid=db.insert(r);r.setId((int)nid);}AlarmScheduler.schedule(this,r);setResult(RESULT_OK);finish();}
          }
          """)


name: Build Universal APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 7.6.4

      - name: Build release bundle
        run: gradle bundleRelease --stacktrace

      - name: Download bundletool
        run: |
          # Bundletool 1.17.2 is compatible with Android 14/APK set generation.
          curl -L -o bundletool.jar https://github.com/google/bundletool/releases/download/1.17.2/bundletool-all-1.17.2.jar

      - name: Build universal APK from AAB
        run: |
          # Temporary signing setup: uses debug keystore for CI artifacts.
          # For production installs, replace with your own release keystore credentials.
          java -jar bundletool.jar build-apks \
            --bundle=app/build/outputs/bundle/release/app-release.aab \
            --output=app-release.apks \
            --mode=universal \
            --ks=$HOME/.android/debug.keystore \
            --ks-key-alias=androiddebugkey \
            --ks-pass=pass:android \
            --key-pass=pass:android

          unzip -o app-release.apks universal.apk

      - name: Verify build output
        run: |
          test -f app/build/outputs/bundle/release/app-release.aab
          test -f universal.apk
          ls -lh app/build/outputs/bundle/release/app-release.aab universal.apk

      - name: Upload universal APK
        uses: actions/upload-artifact@v4
        with:
          name: SmartReminder-universal-apk
          path: universal.apk
          if-no-files-found: error
